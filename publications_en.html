<!DOCTYPE html>

  <title>Yang Jie – Westlake University | Publications in BCI &amp; Neuromorphic Computing</title>
  <meta name="description"
    content="Full publication list of Dr. Jie Yang (Yang Jie), Westlake University. Over 100 papers in brain-computer interfaces, neuromorphic chips, neural modulation, and neural decoding, including ISSCC, JSSC, ICLR, ECCV, JBHI, and TBioCAS." />

  <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/newsreader@5/index.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/mulish@5/index.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/kanit@5/index.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

  <script src="static/js/bootstrap.bundle.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    .year-link { margin: 0 6px; text-decoration: none; color: #007bff; }
    .year-link:hover { text-decoration: underline; }
    .publication-item { transition: color 0.2s ease; cursor: pointer; font-weight: 350; }
    .publication-item:hover { color: #005CFF; text-decoration: underline; }
    .topic-btn.active { background-color: #0d6efd !important; color: white !important; border-color: #0d6efd !important; }
  </style>

<body id="page-top" data-page="publications">

  <!-- Navigation -->
  <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
    <div class="container px-5">
      <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav ms-auto p-4 p-lg-0" id="nav-links"></div>
        <div class="nav-lang-switch" id="lang-switch"></div>
      </div>
    </div>
  </nav>

  <!-- Banner -->
  <section class="top-section container-fluid" id="site-banner">
    <div class="top-section-content">
      <div class="container px-5">
        <h2 id="banner-name" class="text-white lh-1 banner-title"></h2>
        <p id="banner-subtitle" class="text-white lead fw-light banner-sub"></p>
      </div>
    </div>
  </section>

  <!-- Avatar & Contact -->
  <div class="container px-5">
    <div id="avatar">
      <div class="d-flex flex-row justify-content-end align-items-end">
        <div id="avatar-contact" class="avatar-contact-block mx-auto d-block float-start px-3"></div>
        <img id="avatar-img" class="shadow d-block mx-auto avatar-photo" src="" alt="">
      </div>
    </div>
  </div>

  <!-- Topic Filter -->
  <section class="bg-gradient-primary-to-secondary-light mt-5 pt-3" id="home">
    <div class="container px-5">
      <header>
        <h2>Publications</h2>
      </header>
      <!-- Topic filter -->
      <div class="text-center mb-4" id="topic-filters">
        <!-- Injected by site-renderer.js -->
      </div>
      <!-- Year navigation -->
      <div class="main-body" style="font-size: 1.2rem;">
        <div class="d-flex align-items-center flex-wrap gap-2 my-2">
          <span class="fw-bold">Journal Papers:</span>
          <span id="journal-year-nav"></span>
        </div>
        <div class="d-flex align-items-center flex-wrap gap-2 my-2">
          <span class="fw-bold">Conference Papers:</span>
          <span id="conf-year-nav"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- Journal Papers -->
  <section class="bg-gradient-primary-to-secondary-gray mt-5 pt-3" id="journal">
    <div class="container px-5">
      <header>
        <h2><i class="bi bi-file-text-fill"></i> Journal Papers (* corresponding author)</h2>
      </header>
      <div class="main-body lh-base" id="publication-content">
        <div id="journal-list">
          <!-- Injected by site-renderer.js -->
        </div>
      </div>
    </div>
  </section>

  <!-- Conference Papers -->
  <section class="bg-gradient-primary-to-secondary-light mt-5 pt-3" id="conference">
    <div class="container px-5">
      <header>
        <h2><i class="bi bi-file-text-fill"></i> Conference Papers (* corresponding author)</h2>

      <div class="main-body" id="conference-content-wrap">
        <div id="conference-list">
          <!-- Injected by site-renderer.js -->
        </div>
      </div>
    </div>
  </section>

  <!-- Back to top -->
  <button type="button" id="backToTop" class="btn btn-primary back-to-top">↑</button>

  <!-- Footer -->
  <footer class="bg-bottom text-center py-5">
    <div class="container px-5">
      <div class="text-white-50 small">
        <div class="mb-2">
          <a id="icp-link" href="https://beian.miit.gov.cn/" target="_blank">浙ICP备2022004406号-1</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="static/js/site-renderer.js"></script>

</html>
