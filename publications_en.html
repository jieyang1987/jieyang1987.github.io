<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="author" content="Yang Jie, Westlake University" />
  <title>Yang Jie – Westlake University | Publications in BCI &amp; Neuromorphic Computing</title>
  <meta name="description"
    content="Full publication list of Dr. Jie Yang (Yang Jie), Westlake University. Over 100 papers in brain-computer interfaces, neuromorphic chips, neural modulation, and neural decoding, including ISSCC, JSSC, ICLR, ECCV, JBHI, and TBioCAS." />

  <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc@5/index.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc@5/700.css" rel="stylesheet" />

  <link href="static/css/styles.css" rel="stylesheet" />
  <link href="static/css/main.css" rel="stylesheet" />
  <link href="static/css/abstract-modal.css" rel="stylesheet" />

  <script src="static/js/bootstrap.bundle.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    .year-link { margin: 0 6px; text-decoration: none; color: var(--link-color); }
    .year-link:hover { text-decoration: underline; }
    .topic-btn.active { background-color: var(--brand-blue) !important; color: white !important; border-color: var(--brand-blue) !important; }

    /* ═══ Academic typography: publication list ═══ */
    .publications-list { padding-left: 0; list-style: none; counter-reset: none; }
    .publications-list h3 {
      font-family: var(--font-serif);
      font-size: 1.15rem; font-weight: 600; letter-spacing: 0.02em;
      color: var(--heading-color);
      margin: 1.8rem 0 0.9rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid #e5e7eb;
    }
    .publication-item {
      position: relative;
      padding: 0.6rem 0.4rem 0.6rem 0.9rem;
      margin-bottom: 0.15rem;
      line-height: 1.8;
      color: var(--text-primary);
      font-weight: 400;
      border-left: 2px solid transparent;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }
    .publication-item + .publication-item { border-top: 1px dashed #eef1f4; }
    .publication-item:hover { border-left-color: var(--brand-blue); background: #fafbfd; }
    .publication-item .pub-num {
      font-family: var(--font-serif); font-size: 0.88rem;
      color: #b6bcc7; font-weight: 500; margin-right: 0.5rem;
    }
    .publication-item .pub-title {
      display: block;
      font-family: var(--font-serif); font-weight: 550;
      font-size: 1.04rem; color: var(--heading-color); line-height: 1.65;
    }
    .publication-item .pub-meta { display: block; margin-top: 0.15rem; padding-left: 0; }
    .publication-item .pub-authors { color: var(--text-muted); font-size: 0.93rem; }
    .publication-item .pub-venue {
      font-family: var(--font-serif); font-style: italic;
      color: var(--brand-blue); font-weight: 500;
    }
    .publication-item .pub-award { color: var(--brand-blue); font-weight: 600; font-size: 0.9rem; }

    /* PDF / Abstract refined buttons */
    .pdf-badge, .abstract-btn {
      display: inline-block; margin-left: 0.45rem; padding: 0.05rem 0.5rem;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
      border-radius: 3px; border: 1px solid; cursor: pointer;
      text-decoration: none; transition: all 0.2s ease; vertical-align: 1px;
      font-family: var(--font-body);
    }
    .pdf-badge { color: var(--brand-blue); border-color: rgba(29,78,216,0.4); background: transparent; }
    .pdf-badge:hover { background: var(--brand-blue); color: #fff; border-color: var(--brand-blue); }
    .abstract-btn { color: var(--text-muted); border-color: #d3d8e0; background: transparent; }
    .abstract-btn:hover { color: var(--brand-blue); border-color: var(--brand-blue); }

    /* ═══ Statistic badges: restrained outlined style ═══ */
    .journal-summary { margin-top: 4px; display: inline; }
    .journal-summary .badge {
      font-weight: 500; letter-spacing: 0.03em;
      border-radius: 4px; padding: 0.3rem 0.6rem !important;
      font-size: 0.85rem !important; margin: 0.2rem !important;
    }
    .journal-summary .badge.bg-primary {
      background-color: #eef2fd !important; color: var(--brand-blue) !important;
      border: 1px solid rgba(29,78,216,0.28);
    }
    .journal-summary .badge.bg-success {
      background-color: #eaf6ee !important; color: #1e7a3c !important;
      border: 1px solid rgba(30,122,60,0.28);
    }

    /* ═══ Section headings: serif + left bar ═══ */
    #journal header h2, #conference header h2, #home header h2 {
      font-family: var(--font-serif); font-weight: 600; letter-spacing: 0.02em;
      color: var(--heading-color); padding-left: 0.9rem;
      border-left: 4px solid var(--brand-blue);
    }
  </style>
</head>

<body id="page-top" data-page="publications">

  <!-- Navigation -->
  <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
    <div class="container px-5">
      <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav ms-auto p-4 p-lg-0" id="nav-links"></div>
        <div class="nav-lang-switch" id="lang-switch"></div>
      </div>
    </div>
  </nav>

  <!-- Banner -->
  <section class="top-section container-fluid" id="site-banner">
    <div class="top-section-content">
      <div class="container px-5">
        <h2 id="banner-name" class="text-white lh-1 banner-title"></h2>
        <p id="banner-subtitle" class="text-white lead fw-light banner-sub"></p>
      </div>
    </div>
  </section>

  <!-- Avatar & Contact -->
  <div class="container px-5">
    <div id="avatar">
      <div class="d-flex flex-row justify-content-end align-items-end">
        <div id="avatar-contact" class="avatar-contact-block mx-auto d-block float-start px-3"></div>
        <img id="avatar-img" class="shadow d-block mx-auto avatar-photo" src="" alt="">
      </div>
    </div>
  </div>

  <!-- Topic Filter -->
  <section class="bg-gradient-primary-to-secondary-light mt-5 pt-3" id="home">
    <div class="container px-5">
      <header>
        <h2>Publications</h2>
      </header>
      <!-- Topic filter -->
      <div class="text-center mb-4" id="topic-filters">
        <!-- Injected by site-renderer.js -->
      </div>
      <!-- Year navigation -->
      <div class="main-body" style="font-size: 1.2rem;" id="year-nav-desktop">
        <div class="d-flex align-items-center flex-wrap gap-2 my-1">
          <span class="fw-bold">Journal Papers:</span>
          <span id="journal-year-nav"></span>
        </div>
        <div class="d-flex align-items-center flex-wrap gap-2 my-1">
          <span class="fw-bold">Conference Papers:</span>
          <span id="conf-year-nav"></span>
        </div>
      </div>
      <!-- Mobile stats cards -->
      <div class="mobile-pub-stats" id="mobile-pub-stats">
        <!-- Injected by site-renderer.js -->
      </div>
    </div>
  </section>

  <!-- Journal Papers -->
  <section class="bg-gradient-primary-to-secondary-gray mt-5 pt-3" id="journal">
    <div class="container px-5">
      <header>
        <h2><i class="bi bi-file-text-fill"></i> Journal Papers (* corresponding author)</h2>
      </header>
      <div class="main-body lh-base" id="publication-content">
        <div id="journal-list">
          <!-- Injected by site-renderer.js -->
        </div>
      </div>
    </div>
  </section>

  <!-- Conference Papers -->
  <section class="bg-gradient-primary-to-secondary-light mt-5 pt-3" id="conference">
    <div class="container px-5">
      <header>
        <h2><i class="bi bi-file-text-fill"></i> Conference Papers (* corresponding author)</h2>
      </header>
      <div class="main-body" id="conference-content-wrap">
        <div id="conference-list">
          <!-- Injected by site-renderer.js -->
        </div>
      </div>
    </div>
  </section>

  <!-- Back to top -->
  <button type="button" id="backToTop" class="btn btn-primary back-to-top">↑</button>

  <!-- Footer -->
  <footer class="bg-bottom text-center py-5">
    <div class="container px-5">
      <div class="text-white-50 small">
        <div class="mb-2">
          <a id="icp-link" href="https://beian.miit.gov.cn/" target="_blank">浙ICP备2022004406号-1</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="static/js/site-renderer.js?v=2"></script>

</body>

</html>
