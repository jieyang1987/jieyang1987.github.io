name: Deploy to GitHub Pages & CloudBase

on:
  push:
    branches:
      - master
  workflow_dispatch:   # 允许手动触发

# GitHub Pages 需要这个权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # Job 1: 部署到 GitHub Pages
  # ─────────────────────────────────────────
  deploy-github-pages:
    name: Deploy → GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 整个仓库根目录作为静态站点
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────
  # Job 2: 部署到腾讯云 CloudBase 静态托管
  # ─────────────────────────────────────────
  deploy-cloudbase:
    name: Deploy → Tencent CloudBase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to CloudBase
        uses: TencentCloudBase/cloudbase-action@v2
        with:
          secretId: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
          secretKey: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
          envId: ${{ secrets.CLOUDBASE_ENV_ID }}
