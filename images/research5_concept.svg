      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FB5607;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8338EC;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="350" height="350" fill="url(#grad5)"/>
  
  <!-- 装饰元素 -->
  <circle cx="270" cy="80" r="75" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="110" cy="280" r="65" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- 中心内容 -->
  <g text-anchor="middle">
