<svg xmlns="http://www.w3.org/2000/svg" width="350" height="350" viewBox="0 0 350 350">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFB4A2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0AAFF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="350" height="350" fill="url(#grad1)"/>
  
  <!-- 装饰圆形 -->
  <circle cx="280" cy="80" r="80" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="100" cy="280" r="60" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="300" cy="250" r="40" fill="#FFFFFF" opacity="0.15"/>
  
  <!-- 中心内容 -->
  <g text-anchor="middle">
    <!-- 图标 -->
    <text x="175" y="80" font-size="64" fill="#FFFFFF">🧬</text>
    
    <!-- 标题 -->
    <text x="175" y="165" font-size="32" font-weight="bold" fill="#FFFFFF" font-family="SimHei, Arial">闭环神经调控</text>
    
    <!-- 英文标题 -->
    <text x="175" y="205" font-size="16" fill="#FFFFFF" font-family="Arial" opacity="0.9">Closed-Loop Modulation</text>
    
    <!-- 关键词 -->
    <text x="175" y="320" font-size="12" fill="#FFFFFF" font-family="Arial" opacity="0.85">Brain Signal • AI • Stimulation</text>
  </g>
  
  <!-- 底部强调线 -->
  <line x1="80" y1="340" x2="270" y2="340" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
</svg>