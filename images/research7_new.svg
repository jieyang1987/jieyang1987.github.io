<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef2f2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg-grad)"/>
  
  <!-- 左上装饰相机 -->
  <g id="camera" opacity="0.8">
    <rect x="50" y="50" width="80" height="80" fill="#FECACA" stroke="#DC2626" stroke-width="2" rx="8"/>
    <circle cx="90" cy="90" r="25" fill="none" stroke="#DC2626" stroke-width="3"/>
    <circle cx="90" cy="90" r="18" fill="#DC2626" opacity="0.5"/>
    <rect x="75" y="65" width="30" height="8" fill="#DC2626"/>
  </g>
  
  <!-- 右下装饰目标框 -->
  <g id="target" opacity="0.6">
    <circle cx="750" cy="500" r="50" fill="none" stroke="#DC2626" stroke-width="2" opacity="0.5"/>
    <circle cx="750" cy="500" r="35" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.3"/>
    <line x1="740" y1="500" x2="760" y2="500" stroke="#DC2626" stroke-width="2" opacity="0.6"/>
    <line x1="750" y1="490" x2="750" y2="510" stroke="#DC2626" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- 中央处理流程 -->
  <g id="processing-pipeline">
    <!-- 输入图像 -->
    <rect x="200" y="240" width="80" height="80" fill="#FECACA" stroke="#DC2626" stroke-width="2" rx="5">
      <title>1000 fps Input</title>
    </rect>
    <text x="240" y="295" font-size="12" text-anchor="middle" fill="#DC2626" font-family="Arial, sans-serif">1000fps</text>
    
    <!-- 箭头1 -->
    <line x1="280" y1="280" x2="320" y2="280" stroke="#DC2626" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- 特征提取 -->
    <rect x="320" y="240" width="80" height="80" fill="#F87171" stroke="#DC2626" stroke-width="2" rx="5">
      <title>CNN Features</title>
    </rect>
    <text x="360" y="295" font-size="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Features</text>
    
    <!-- 箭头2 -->
    <line x1="400" y1="280" x2="440" y2="280" stroke="#DC2626" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- 目标识别 -->
    <rect x="440" y="240" width="80" height="80" fill="#DC2626" stroke="#DC2626" stroke-width="2" rx="5">
      <title>Object Detection</title>
    </rect>
    <text x="480" y="295" font-size="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Detect</text>
    
    <!-- 箭头3 -->
    <line x1="520" y1="280" x2="560" y2="280" stroke="#DC2626" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- 追踪输出 -->
    <rect x="560" y="240" width="80" height="80" fill="#FECACA" stroke="#DC2626" stroke-width="2" rx="5">
      <title>Tracking Output</title>
    </rect>
    <text x="600" y="295" font-size="12" text-anchor="middle" fill="#DC2626" font-family="Arial, sans-serif">Track</text>
  </g>
  
  <!-- 性能参数 -->
  <g id="performance-params">
    <!-- 左侧参数 -->
    <rect x="150" y="380" width="150" height="80" fill="#FECACA" stroke="#DC2626" stroke-width="1" opacity="0.5" rx="5"/>
    <text x="225" y="405" font-size="14" text-anchor="middle" fill="#DC2626" font-weight="bold" font-family="Arial, sans-serif">Chip Specs</text>
    <text x="160" y="430" font-size="11" fill="#DC2626" font-family="Arial, sans-serif">• 65nm CMOS</text>
    <text x="160" y="450" font-size="11" fill="#DC2626" font-family="Arial, sans-serif">• 413 GOPS</text>
    
    <!-- 右侧参数 -->
    <rect x="500" y="380" width="150" height="80" fill="#FECACA" stroke="#DC2626" stroke-width="1" opacity="0.5" rx="5"/>
    <text x="575" y="405" font-size="14" text-anchor="middle" fill="#DC2626" font-weight="bold" font-family="Arial, sans-serif">Applications</text>
    <text x="510" y="430" font-size="11" fill="#DC2626" font-family="Arial, sans-serif">• Autonomous Driving</text>
    <text x="510" y="450" font-size="11" fill="#DC2626" font-family="Arial, sans-serif">• Robotics</text>
  </g>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#DC2626" />
    </marker>
  </defs>
  
  <!-- 标题 -->
  <text x="400" y="550" font-size="48" font-weight="bold" text-anchor="middle" fill="#DC2626" font-family="SimHei, sans-serif">
    AI视觉芯片
  </text>
  
  <!-- 副标题 -->
  <text x="400" y="595" font-size="24" text-anchor="middle" fill="#F87171" font-family="Arial, sans-serif">
    AI Vision Chips
  </text>
</svg>