<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg-grad)"/>
  
  <!-- 左上装饰 -->
  <circle cx="100" cy="100" r="70" fill="#B8E6D5" stroke="#34A853" stroke-width="3" opacity="0.9"/>
  <circle cx="100" cy="100" r="35" fill="#34A853" opacity="0.8"/>
  
  <!-- 右下装饰 -->
  <rect x="650" y="450" width="100" height="100" fill="#B8E6D5" stroke="#34A853" stroke-width="2" opacity="0.7"/>
  <circle cx="700" cy="500" r="25" fill="#34A853" opacity="0.6"/>
  
  <!-- 中央脑状结构 -->
  <g id="brain-structure">
    <!-- 左叶 -->
    <path d="M 300 280 Q 280 250 290 180 Q 310 200 320 250 Q 310 280 300 320" fill="#B8E6D5" stroke="#34A853" stroke-width="2"/>
    <!-- 右叶 -->
    <path d="M 500 280 Q 520 250 510 180 Q 490 200 480 250 Q 490 280 500 320" fill="#B8E6D5" stroke="#34A853" stroke-width="2"/>
    <!-- 中心连接 -->
    <ellipse cx="400" cy="300" rx="60" ry="80" fill="#81C995" stroke="#34A853" stroke-width="3"/>
    <!-- 内核 -->
    <circle cx="400" cy="300" r="30" fill="#34A853"/>
  </g>
  
  <!-- 信号波纹 -->
  <g stroke="#81C995" stroke-width="2" fill="none" opacity="0.6">
    <circle cx="400" cy="300" r="50" stroke-dasharray="5,5"/>
    <circle cx="400" cy="300" r="80" stroke-dasharray="5,5" opacity="0.4"/>
    <circle cx="400" cy="300" r="110" stroke-dasharray="5,5" opacity="0.2"/>
  </g>
  
  <!-- 顶部流动线 -->
  <g stroke="#34A853" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 200 150 Q 300 100 400 130 T 600 150" stroke-linecap="round"/>
    <circle cx="200" cy="150" r="4" fill="#34A853"/>
    <circle cx="400" cy="130" r="4" fill="#34A853"/>
    <circle cx="600" cy="150" r="4" fill="#34A853"/>
  </g>
  
  <!-- 底部流动线 -->
  <g stroke="#34A853" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 200 450 Q 300 500 400 470 T 600 450" stroke-linecap="round"/>
    <circle cx="200" cy="450" r="4" fill="#34A853"/>
    <circle cx="400" cy="470" r="4" fill="#34A853"/>
    <circle cx="600" cy="450" r="4" fill="#34A853"/>
  </g>
  
  <!-- 标题 -->
  <text x="400" y="500" font-size="48" font-weight="bold" text-anchor="middle" fill="#34A853" font-family="SimHei, sans-serif">
    神经形态芯片
  </text>
  
  <!-- 副标题 -->
  <text x="400" y="550" font-size="24" text-anchor="middle" fill="#81C995" font-family="Arial, sans-serif">
    Neuromorphic Computing
  </text>
</svg>