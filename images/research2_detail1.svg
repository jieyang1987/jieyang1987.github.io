<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e7c34;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f9fdf7"/>
  
  <!-- 标题 -->
  <text x="400" y="50" font-size="28" font-weight="bold" text-anchor="middle" fill="#1e3a1f">
    神经形态芯片架构
  </text>
  
  <!-- 芯片层次 -->
  <!-- 第一层：输入编码 -->
  <rect x="150" y="100" width="500" height="80" rx="8" fill="url(#grad2)" opacity="0.2" stroke="#34a853" stroke-width="2"/>
  <text x="400" y="140" font-size="14" text-anchor="middle" fill="#1e3a1f" font-weight="bold">输入编码层 (DVS/感知)</text>
  
  <!-- 第二层：脉冲处理核心 -->
  <g filter="url(#shadow)">
    <!-- 左侧核心1 -->
    <rect x="180" y="220" width="100" height="90" rx="6" fill="#d1f4a8" stroke="#34a853" stroke-width="2"/>
    <text x="230" y="245" font-size="12" text-anchor="middle" fill="#1e3a1f" font-weight="bold">脉冲核心1</text>
    <text x="230" y="262" font-size="11" text-anchor="middle" fill="#2d5a2d">SNN处理</text>
    <text x="230" y="278" font-size="10" text-anchor="middle" fill="#555">256通道</text>
    <circle cx="230" cy="305" r="3" fill="#34a853"/>
  </g>
  
  <!-- 中间核心2 -->
  <g filter="url(#shadow)">
    <rect x="350" y="220" width="100" height="90" rx="6" fill="#d1f4a8" stroke="#34a853" stroke-width="2"/>
    <text x="400" y="245" font-size="12" text-anchor="middle" fill="#1e3a1f" font-weight="bold">脉冲核心2</text>
    <text x="400" y="262" font-size="11" text-anchor="middle" fill="#2d5a2d">SNN处理</text>
    <text x="400" y="278" font-size="10" text-anchor="middle" fill="#555">256通道</text>
    <circle cx="400" cy="305" r="3" fill="#34a853"/>
  </g>
  
  <!-- 右侧核心3 -->
  <g filter="url(#shadow)">
    <rect x="520" y="220" width="100" height="90" rx="6" fill="#d1f4a8" stroke="#34a853" stroke-width="2"/>
    <text x="570" y="245" font-size="12" text-anchor="middle" fill="#1e3a1f" font-weight="bold">脉冲核心3</text>
    <text x="570" y="262" font-size="11" text-anchor="middle" fill="#2d5a2d">SNN处理</text>
    <text x="570" y="278" font-size="10" text-anchor="middle" fill="#555">256通道</text>
    <circle cx="570" cy="305" r="3" fill="#34a853"/>
  </g>
  
  <!-- 连接线 -->
  <line x1="230" y1="310" x2="400" y2="350" stroke="#34a853" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="310" x2="400" y2="350" stroke="#34a853" stroke-width="2" opacity="0.5"/>
  <line x1="570" y1="310" x2="400" y2="350" stroke="#34a853" stroke-width="2" opacity="0.5"/>
  
  <!-- 第三层：集成控制 -->
  <g filter="url(#shadow)">
    <rect x="280" y="350" width="240" height="70" rx="8" fill="#b7e4c7" stroke="#34a853" stroke-width="2.5"/>
    <text x="400" y="378" font-size="14" text-anchor="middle" fill="#1e3a1f" font-weight="bold">神经形态控制器</text>
    <text x="400" y="398" font-size="11" text-anchor="middle" fill="#2d5a2d">事件驱动 • 存算一体 • 在线学习</text>
  </g>
  
  <!-- 第四层：输出 -->
  <circle cx="400" cy="480" r="30" fill="#34a853" opacity="0.8"/>
  <text x="400" y="487" font-size="20" text-anchor="middle" fill="white">🔌</text>
  
  <!-- 输出标签 -->
  <text x="400" y="535" font-size="13" text-anchor="middle" fill="#1e3a1f" font-weight="bold">输出决策 (脉冲序列)</text>
  
  <!-- 底部参数 -->
  <g filter="url(#shadow)">
    <rect x="100" y="555" width="600" height="35" rx="6" fill="#f0fdf4" stroke="#34a853" stroke-width="1.5"/>
    <text x="200" y="578" font-size="11" font-weight="bold" fill="#1e3a1f">✓ 能效: 0.078 pJ/SOP</text>
    <text x="450" y="578" font-size="11" font-weight="bold" fill="#1e3a1f">✓ 延迟: &lt;1ms</text>
  </g>
</svg>