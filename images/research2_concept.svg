<svg xmlns="http://www.w3.org/2000/svg" width="350" height="350" viewBox="0 0 350 350">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#44A08D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E86AB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="350" height="350" fill="url(#grad2)"/>
  
  <!-- 装饰元素 -->
  <circle cx="260" cy="100" r="75" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="120" cy="270" r="55" fill="#FFFFFF" opacity="0.2"/>
  <rect x="50" y="50" width="60" height="60" rx="8" fill="#FFFFFF" opacity="0.1" transform="rotate(15 80 80)"/>
  
  <!-- 中心内容 -->
  <g text-anchor="middle">
    <!-- 图标 -->
    <text x="175" y="80" font-size="64" fill="#FFFFFF">🧠</text>
    
    <!-- 标题 -->
    <text x="175" y="165" font-size="32" font-weight="bold" fill="#FFFFFF" font-family="SimHei, Arial">神经形态芯片</text>
    
    <!-- 英文标题 -->
    <text x="175" y="205" font-size="16" fill="#FFFFFF" font-family="Arial" opacity="0.9">Neuromorphic Chips</text>
    
    <!-- 关键词 -->
    <text x="175" y="320" font-size="12" fill="#FFFFFF" font-family="Arial" opacity="0.85">SNN • Energy Efficient • Edge AI</text>
  </g>
  
  <!-- 底部强调线 -->
  <line x1="80" y1="340" x2="270" y2="340" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
</svg>