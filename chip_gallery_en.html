  <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

  <style>
    .paper-link {
      color: #2B5BA9;
      text-decoration: none;
      font-weight: bold;
    }
    .paper-link:hover {
      color: #1d3f7a;
      text-decoration: underline;
    }
    #top-section-bg-text {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 400;

    .rounded.shadow:hover {
      transform: scale(1.02);
      transition: transform 0.3s ease;

<body id="page-top" data-page="chip_gallery">
  <!-- Navigation (injected by site-renderer.js) -->
  <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
    <div class="container px-5">
      <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav ms-auto p-4 p-lg-0" id="nav-links"></div>
        <div class="nav-lang-switch" id="lang-switch"></div>
      </div>
    </div>
  </nav>

      <div class="container px-5">

        <p id="banner-subtitle" class="text-white lead fw-light banner-sub"></p>

      <header class="mb-4">

      <div class="row gx-3 gy-4" id="chip-gallery-row"></div>

    <div class="container px-5">
      <div class="text-white-50 small">
