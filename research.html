    "mainEntity": [
      {
        "@type": "ResearchProject",
        "name": "闭环神经调控系统芯片",
        "description": "集成颅内脑信号实时采集、端侧AI处理与刺激反馈功能的闭环神经调控系统，用于癫痫、抑郁症等脑疾病的诊疗。",
        "keywords": "闭环神经调控, 神经刺激, 脑信号采集, 闭环反馈"
      },
      {
        "@type": "ResearchProject",
        "name": "高通量脑机接口芯片",
        "description": "具备千通道级采集与无线传输能力的高通量低功耗脑机接口芯片系统，用于语言重建、肢体康复和意图识别。",
        "keywords": "脑机接口, BCI, 高通量采集, 无线传输, 神经信号"
      },
      {
        "@type": "ResearchProject",
        "name": "类脑计算芯片",
        "description": "具备存算一体架构与在线持续学习能力的类脑计算芯片，包括尖峰神经网络（SNN）处理器，应用于智能感知、机器人和生物医疗。",
        "keywords": "类脑计算, 神经形态, SNN, 尖峰神经网络, 能效计算"
      },
      {
        "@type": "ResearchProject",
        "name": "脑语言解码",
        "description": "从颅内脑信号精准解码语言和运动意图，实现语言重建和神经假肢控制的关键技术。",
        "keywords": "语言解码, 神经解码, 语言重建, 意图识别"
      }
    ]
  }
